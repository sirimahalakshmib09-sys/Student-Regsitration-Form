<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--Title-->
    <title>Student Registration Form</title>
    <!--Connect CSS-->
    <link rel="stylesheet" href="form.css"></link>
</head>
<body>
    <!--Main Heading-->
    <h1>Student Registration Form</h1>
    <div id="form-view">
    <!--Submit Action-->
    <form action="submit.php" method="post" id="form" novalidate>
        <!--First Name Field-->
        <div class="form-group">
        <label for="firstname">First Name:</label>
        <input type="text" id="firstname" name="first_name" required>
        <span id="firstname-error" class="error-message"></span>
        </div>
        <!--Last Name Field-->
        <div class="form-group">
        <label for="lastname">Last Name:</label>
        <input type="text" id="lastname" name="last_name" required>
        <span id="lastname-error" class="error-message"></span>
        </div>
        <!--Registration Number Field-->
        <div class="form-group">
        <label for="regdno">Registration Number:</label>
        <input type="text" id="regdno" name="red_gno" required>
        <span id="regdno-error" class="error-message"></span>
        </div>
        <!--Date of Birth Field-->
        <div class="form-group">
        <label for="dob">Date of Birth:</label>
        <input type="date" id="dob" name="date_of_birth" required>
        <span id="dob-error" class="error-message"></span>
        </div>
        <!--Gender Field-->
        <div class="form-group">
        <label>Gender:</label>
        <div class="form-buttons">
        <br>
        <input type="radio" id="male" name="gender" value="male" >
        <label for="male">Male</label>
        <br>
        <input type="radio" id="female" name="gender" value="female">
        <label for="female">Female</label>
        <br>
        <input type="radio" id="other" name="gender" value="other">
        <label for="other">Prefer not to say</label>
        </div>
        </div>
        <!--Skills Field-->
        <div class="form-group">
        <label>Skills:</label>
        <div class="form-buttons">
        <br>
        <input type="checkbox" id="frontend" name="skills[]" value="frontend">
        <label for="frontend">Frontend</label>
        <br>
        <input type="checkbox" id="backend" name="skills[]" value="backend">
        <label for="backend">Backend</label>
        <br>
        <input type="checkbox" id="fullstack" name="skills[]" value="fullstack">
        <label for="fullstack">Fullstack</label>
        </div>
        </div>
        <!--Department Field-->
        <div class="form-group">
        <label for="dept">Department:</label>
        <select id="dept" name="department">
        <option>CSE</option>
        <option>CST</option>
        <option>CSM</option>
        <option>CSD</option>
        <option>CIC</option>
        <option>ECE</option>
        <option>ECT</option>
        <option>CIVIL</option>
        <option>MECHANICAL</option>
        </select>
        </div>
        <!--Email Field-->
        <div class="form-group">
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" placeholder="student@example.com" required>
        <span id="email-error" class="error-message"></span>
        </div>
        <!--Phone Number Field-->
        <div class="form-group">
        <label for="phone">Phone Number:</label>
        <input type="tel" id="phone" name="phone" placeholder="1234567890" required>
        <span id="phone-error" class="error-message"></span>
        </div>
        <!--Address Field-->
        <div class="form-group">
        <label for="address">Address:</label>
        <input type="text" id="address" name="address" required>
        <span id="address-error" class="error-message"></span>
        </div>
        <!--Submit Button-->
        <div class="form-group">
        <input type="submit" value="Submit">
        </div>
    </form>
    </div>
        <!--Success Message-->
        <div id="success">
        <h1>Good Job!!!</h1>
        <p>Details Submitted Successfully</p>
        <div id="buttons">
            <button id="closebtn">Close</button>
        </div>
        </div>
        <!--Connect JS-->
    <script src="form.js"></script>
</body>
</html>
